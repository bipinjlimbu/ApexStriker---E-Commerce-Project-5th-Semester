<html>
<head>
    <title>ApexStriker | Navbar</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
</head>

<body class="bg-slate-50">
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                
                <div class="flex items-center gap-2">
                    <div class="bg-blue-600 p-1.5 rounded-lg text-white">
                        <i data-lucide="zap" class="w-6 h-6 fill-current"></i>
                    </div>
                    <span class="text-xl font-black tracking-tighter text-slate-900">APEX<span class="text-blue-600">STRIKER</span></span>
                </div>

                <div class="hidden md:flex flex-1 max-w-md mx-8">
                    <div class="relative w-full">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                            <i data-lucide="search" class="w-4 h-4"></i>
                        </div>
                        <input type="text" placeholder="Search boots, jerseys, gear..." 
                               class="block w-full pl-10 pr-3 py-2 border border-slate-300 rounded-xl bg-slate-50 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-center space-x-4">
                    <a href="#" class="relative p-2 text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                        <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                        <span class="absolute top-1 right-1 bg-red-500 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
                    </a>

                    {% if user.is_authenticated %}
                        <button class="p-2 text-slate-600 hover:bg-slate-100 rounded-full transition-colors">
                            <i data-lucide="bell" class="w-6 h-6"></i>
                        </button>

                        <div class="flex items-center space-x-3 border-l pl-4 ml-2 border-slate-200">
                            <div class="text-right hidden sm:block">
                                <p class="text-sm font-bold text-slate-900 leading-none">{{ user.username }}</p>
                                <p class="text-[10px] font-medium text-blue-600 uppercase tracking-wider">{{ user.role }}</p>
                            </div>
                            <div class="w-9 h-9 bg-blue-100 rounded-full flex items-center justify-center text-blue-700 border border-blue-200">
                                <i data-lucide="user" class="w-5 h-5"></i>
                            </div>
                        </div>
                    {% else %}
                        <div class="flex items-center space-x-2">
                            <a href="/login/" class="text-sm font-semibold text-slate-600 hover:text-blue-600 px-3">Login</a>
                            <a href="/register/" class="bg-blue-600 text-white text-sm font-bold px-5 py-2.5 rounded-xl hover:bg-blue-700 transition-all shadow-md shadow-blue-200">
                                Register
                            </a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
