<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Gear | ApexStriker</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        #image-preview { transition: transform 0.3s ease; }
        .group:hover #image-preview { transform: scale(1.05); }
        input:focus, select:focus, textarea:focus { border-color: #2563eb !important; background-color: white !important; }
        .hidden-field { display: none; }
    </style>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen">
    {% include 'components/_navbar.html' %}

    <main class="flex-grow flex items-center justify-center py-12 px-4 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-1/3 h-full bg-blue-600 skew-x-12 translate-x-32 opacity-[0.03] -z-10"></div>

        <div class="max-w-3xl w-full bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
            
            <div class="text-center mb-10">
                <div class="inline-block bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-[0.2em] italic mb-4">Inventory Terminal</div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">Add New <span class="text-blue-600">Product</span></h2>
            </div>

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}

                <div class="space-y-2">
                    <label class="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2 italic">
                        <i data-lucide="image-plus" class="w-4 h-4 text-blue-600"></i> Product Imagery
                    </label>
                    <div class="flex items-center justify-center w-full">
                        <label class="relative group flex flex-col items-center justify-center w-full h-56 border-2 border-slate-300 border-dashed rounded-[2rem] cursor-pointer bg-slate-50 hover:bg-slate-100 transition overflow-hidden">
                            <div id="upload-placeholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                                <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-3">
                                    <i data-lucide="package-plus" class="w-6 h-6"></i>
                                </div>
                                <p class="text-sm text-slate-500 font-bold italic">Click to upload product photo</p>
                            </div>
                            <img id="image-preview" class="hidden absolute inset-0 w-full h-full object-cover" />
                            <input type="file" name="image" id="product-image" accept="image/*" class="hidden" onchange="previewImage(this)" />
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="tag" class="w-3 h-3 text-blue-500"></i> Product Name</label>
                        <input type="text" name="name" placeholder="e.g. Nike Phantom GX" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="banknote" class="w-3 h-3 text-blue-500"></i> Price (Rs.)</label>
                        <input type="number" name="price" placeholder="0.00" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="layers" class="w-3 h-3 text-blue-500"></i> Category</label>
                        <select name="category" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic appearance-none cursor-pointer">
                            <option value="" hidden>Select Category</option>
                            <option value="kits">Jersey & Kits</option>
                            <option value="boots">Football Boots</option>
                            <option value="accessories">Accessories</option>
                            <option value="equipment">Training Equipment</option>
                            <option value="supplements">Health & Supplements</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="award" class="w-3 h-3 text-blue-500"></i> Brand</label>
                        <select id="brandSelect" name="brand" onchange="checkBrand(this)" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic appearance-none cursor-pointer">
                            <option value="" hidden>Select Brand</option>
                            <option value="nike">Nike</option>
                            <option value="adidas">Adidas</option>
                            <option value="puma">Puma</option>
                            <option value="nb">New Balance (NB)</option>
                            <option value="mizuno">Mizuno</option>
                            <option value="g-form">G-Form</option>
                            <option value="reusch">Reusch</option>
                            <option value="other">Other (Specify Below)</option>
                        </select>
                    </div>

                    <div id="otherBrandField" class="hidden-field md:col-span-2 space-y-1">
                        <label class="text-[11px] font-black text-blue-600 uppercase tracking-widest ml-2 italic flex items-center gap-2">
                            <i data-lucide="plus-circle" class="w-3 h-3"></i> Specify Brand Name
                        </label>
                        <input type="text" name="other_brand_name" placeholder="Enter your brand name" class="w-full p-4 bg-blue-50 border border-blue-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic shadow-sm">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="box" class="w-3 h-3 text-blue-500"></i> Stock Available</label>
                        <input type="number" name="stock" value="1" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="align-left" class="w-3 h-3 text-blue-500"></i> Description</label>
                        <textarea name="description" rows="4" placeholder="Describe specs, materials, features..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic"></textarea>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-200 flex items-center justify-center gap-3 transition-all active:scale-95 uppercase italic tracking-widest">
                    <i data-lucide="upload-cloud" class="w-5 h-5"></i>
                    Publish Product
                </button>
            </form>
        </div>
    </main>

    {% include 'components/_footer.html' %}

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();

        function checkBrand(select) {
            const otherField = document.getElementById('otherBrandField');
            if (select.value === 'other') {
                otherField.classList.remove('hidden-field');
                otherField.classList.add('animate-pulse'); // Subtle entry effect
                setTimeout(() => otherField.classList.remove('animate-pulse'), 500);
            } else {
                otherField.classList.add('hidden-field');
            }
        }

        function previewImage(input) {
            const file = input.files[0];
            const preview = document.getElementById('image-preview');
            const placeholder = document.getElementById('upload-placeholder');
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }
    </script>
</body>
</html>
