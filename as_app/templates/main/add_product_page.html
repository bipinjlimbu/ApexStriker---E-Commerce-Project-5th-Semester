<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deploy Gear | ApexStriker</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        .image-card { transition: all 0.3s ease; }
        .image-card:hover { transform: translateY(-5px); }
        input:focus, select:focus, textarea:focus { border-color: #2563eb !important; background-color: white !important; }
        .hidden-field { display: none; }
        .removal-overlay {
            position: absolute; inset: 0; background: rgba(239, 68, 68, 0.75);
            backdrop-filter: blur(2px); opacity: 0; display: flex;
            align-items: center; justify-content: center; transition: 0.3s; cursor: pointer;
        }
        .removal-overlay:hover { opacity: 1; }
    </style>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen font-sans">
    {% include 'components/_navbar.html' %}

    <main class="flex-grow flex items-center justify-center py-12 px-4 relative">
        <div class="max-w-3xl w-full bg-white p-8 rounded-[2.5rem] shadow-2xl border border-slate-100">
            
            <div class="text-center mb-10">
                <div class="inline-block bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-[0.2em] italic mb-4">Inventory Terminal</div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">Add New <span class="text-blue-600">Product</span></h2>
            </div>

            <form id="productForm" method="POST" enctype="multipart/form-data" class="space-y-6" onsubmit="handleFormSubmission(event)">
                {% csrf_token %}

                <div class="space-y-4">
                    <label class="block text-sm font-bold text-slate-700 flex items-center gap-2 italic">
                        <i data-lucide="images" class="w-4 h-4 text-blue-600"></i> Product Gallery (Multiple)
                    </label>
                    <div class="grid grid-cols-1 gap-4">
                        <label class="relative group flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-[2rem] cursor-pointer bg-slate-50 hover:bg-slate-100 transition shadow-inner">
                            <div class="flex flex-col items-center justify-center">
                                <i data-lucide="plus" class="w-6 h-6 text-blue-500 mb-1"></i>
                                <p class="text-[10px] text-slate-500 font-black uppercase tracking-widest italic">Add Gear Photos</p>
                            </div>
                            <input type="file" id="real-images-input" accept="image/*" multiple class="hidden" onchange="handleQueueSelection(this)" />
                        </label>
                        <div id="image-gallery-grid" class="grid grid-cols-3 md:grid-cols-4 gap-3"></div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-4 border-t border-slate-100">
                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="tag" class="w-3 h-3 text-blue-500"></i> Product Name</label>
                        <input type="text" name="name" placeholder="Enter product name" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="banknote" class="w-3 h-3 text-blue-500"></i> Price (Rs.)</label>
                        <input type="number" name="price" placeholder="Enter Price in Rs." required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="layers" class="w-3 h-3 text-blue-500"></i> Category</label>
                        <select name="category" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic appearance-none cursor-pointer">
                            <option value="" hidden>Select Category</option>
                            <option value="kits">Jersey & Kits</option>
                            <option value="boots">Football Boots</option>
                            <option value="accessories">Accessories</option>
                            <option value="equipment">Training Equipment</option>
                            <option value="supplements">Health & Supplements</option>
                        </select>
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="award" class="w-3 h-3 text-blue-500"></i> Brand</label>
                        <select id="brandSelect" name="brand" onchange="checkBrand(this)" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic appearance-none cursor-pointer">
                            <option value="" hidden>Select Brand</option>
                            <option value="nike">Nike</option>
                            <option value="adidas">Adidas</option>
                            <option value="puma">Puma</option>
                            <option value="nb">New Balance (NB)</option>
                            <option value="mizuno">Mizuno</option>
                            <option value="g-form">G-Form</option>
                            <option value="reusch">Reusch</option>
                            <option value="other">Other (Specify Below)</option>
                        </select>
                    </div>

                    <div id="otherBrandField" class="hidden-field md:col-span-2 space-y-1">
                        <input type="text" name="other_brand_name" placeholder="Enter your brand name" class="w-full p-4 bg-blue-50 border border-blue-200 rounded-2xl font-bold text-slate-900 outline-none transition italic">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="box" class="w-3 h-3 text-blue-500"></i> Stock Available</label>
                        <input type="number" name="stock" placeholder="Enter stock quantity" required class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic">
                    </div>

                    <div class="space-y-1 md:col-span-2">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2"><i data-lucide="align-left" class="w-3 h-3 text-blue-500"></i> Description</label>
                        <textarea name="description" rows="4" placeholder="Enter product description" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic"></textarea>
                    </div>
                </div>

                <div class="space-y-4 pt-6">
                    <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-700 transition-all active:scale-95 flex items-center justify-center gap-3 uppercase italic tracking-[0.2em] text-xs">
                        <i data-lucide="zap" class="w-5 h-5 fill-current"></i> Publish Gear to Market
                    </button>
                    <a href="/dashboard/vendor/" class="w-full bg-slate-100/50 border border-slate-200 text-slate-500 font-bold py-4 rounded-2xl hover:bg-slate-200/50 hover:text-slate-800 transition-all flex items-center justify-center gap-3 uppercase italic tracking-widest text-[10px]">
                        Return to Dashboard
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
        let virtualImageQueue = [];

        function checkBrand(select) {
            const otherField = document.getElementById('otherBrandField');
            otherField.style.display = (select.value === 'other') ? 'block' : 'none';
        }

        function handleQueueSelection(input) {
            Array.from(input.files).forEach(file => {
                const exists = virtualImageQueue.some(f => f.name === file.name && f.size === file.size);
                if (!exists) {
                    virtualImageQueue.push(file);
                    addQueueItemToGallery(file);
                }
            });
            input.value = ''; 
        }

        function addQueueItemToGallery(file) {
            const grid = document.getElementById('image-gallery-grid');
            const reader = new FileReader();
            reader.onload = (e) => {
                const uniqueId = Date.now() + Math.random();
                const div = document.createElement('div');
                div.className = "image-card relative aspect-square rounded-2xl overflow-hidden border border-slate-200 shadow-lg group";
                div.innerHTML = `
                    <img src="${e.target.result}" class="w-full h-full object-cover">
                    <div class="removal-overlay" onclick="removeImage('${uniqueId}', this)">
                        <div class="bg-white p-2 rounded-full border border-red-500 shadow-lg"><i data-lucide="trash-2" class="text-red-600 w-5 h-5"></i></div>
                    </div>`;
                div.setAttribute('data-id', uniqueId);
                div.fileRef = file;
                grid.appendChild(div);
                lucide.createIcons();
            }
            reader.readAsDataURL(file);
        }

        function removeImage(id, el) {
            const card = el.closest('[data-id]');
            virtualImageQueue = virtualImageQueue.filter(f => f !== card.fileRef);
            card.remove();
        }

        // Logic updated: This manually appends virtual images and triggers the form POST properly
        async function handleFormSubmission(e) {
            e.preventDefault();
            if (virtualImageQueue.length === 0) return alert("Please add at least one gear photo.");

            const form = e.target;
            const formData = new FormData(form);

            // Important: Clear out any standard 'images' field and add our virtual ones
            formData.delete('images'); 
            virtualImageQueue.forEach((file) => {
                formData.append('images', file);
            });

            // Sending via fetch so backend can handle redirect
            try {
                const response = await fetch(window.location.href, {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' }
                });

                if (response.redirected) {
                    window.location.href = response.url; // Backend redirect respect garchha
                } else if (response.ok) {
                    // Yo case ma if backend redirects manually or returns success
                    const result = await response.json();
                    if(result.redirect_url) window.location.href = result.redirect_url;
                }
            } catch (err) {
                console.error("Submission failed", err);
            }
        }
    </script>
</body>
</html>
