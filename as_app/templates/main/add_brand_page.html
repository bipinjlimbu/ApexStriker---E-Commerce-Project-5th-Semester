<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Brand | ApexStriker Admin</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        input:focus, textarea:focus { border-color: #2563eb !important; background-color: white !important; }
        .logo-preview-container {
            width: 120px; height: 120px; border-radius: 2rem;
            border: 2px dashed #e2e8f0; display: flex;
            align-items: center; justify-content: center;
            overflow: hidden; background: #f8fafc;
        }
        #logo-img-preview { width: 100%; height: 100%; object-cover: contain; display: none; }
    </style>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen font-sans">
    {% include 'components/_navbar.html' %}

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-2xl w-full bg-white p-10 rounded-[2.5rem] shadow-2xl border border-slate-100">
            
            <div class="text-center mb-10">
                <div class="inline-block bg-blue-600 text-white text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-[0.2em] italic mb-4">Authority Console</div>
                <h2 class="text-3xl font-black text-slate-900 tracking-tighter uppercase italic">Register <span class="text-blue-600">New Brand</span></h2>
                <p class="text-slate-500 text-xs font-bold mt-2 uppercase tracking-wider">Expand the ApexStriker Ecosystem</p>
            </div>

            <form method="POST" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}

                <div class="flex flex-col items-center gap-4 mb-8">
                    <div class="logo-preview-container" id="preview-box">
                        <i data-lucide="image" id="placeholder-icon" class="w-8 h-8 text-slate-300"></i>
                        <img id="logo-img-preview" src="#" alt="Logo Preview">
                    </div>
                    
                    <label class="cursor-pointer bg-slate-100 hover:bg-slate-200 text-slate-600 px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all italic border border-slate-200">
                        Upload Brand Logo
                        <input type="file" name="logo" accept="image/*" class="hidden" onchange="previewLogo(this)" required>
                    </label>
                </div>

                <div class="space-y-5">
                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2">
                            <i data-lucide="award" class="w-3 h-3 text-blue-500"></i> Brand Identity (Name)
                        </label>
                        <input type="text" name="name" placeholder="e.g. Nike, Adidas, Puma..." required 
                               class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic">
                    </div>

                    <div class="space-y-1">
                        <label class="text-[11px] font-black text-slate-500 uppercase tracking-widest ml-2 italic flex items-center gap-2">
                            <i data-lucide="align-left" class="w-3 h-3 text-blue-500"></i> Brand Legacy (Description)
                        </label>
                        <textarea name="description" rows="4" placeholder="Brief history or brand focus..." 
                                  class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold text-slate-900 focus:ring-2 focus:ring-blue-500 outline-none transition italic"></textarea>
                    </div>
                </div>

                <div class="space-y-4 pt-6">
                    <button type="submit" class="w-full bg-blue-600 text-white font-black py-5 rounded-2xl hover:bg-blue-700 transition-all active:scale-95 flex items-center justify-center gap-3 uppercase italic tracking-[0.2em] text-xs">
                        <i data-lucide="check" class="w-4 h-4"></i> Register Brand
                    </button>
                    <a href="javascript:window.history.back()" class="w-full bg-slate-100/50 border border-slate-200 text-slate-500 font-bold py-4 rounded-2xl hover:bg-slate-200/50 hover:text-slate-800 transition-all flex items-center justify-center gap-3 uppercase italic tracking-widest text-[10px]">
                        <i data-lucide="x" class="w-4 h-4"></i> Cancel & Return
                    </a>
                </div>
            </form>
        </div>
    </main>

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();

        function previewLogo(input) {
            const preview = document.getElementById('logo-img-preview');
            const placeholder = document.getElementById('placeholder-icon');
            const box = document.getElementById('preview-box');

            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    placeholder.style.display = 'none';
                    box.style.borderStyle = 'solid';
                    box.style.borderColor = '#2563eb';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
