<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password | ApexStriker</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
</head>

<body class="bg-slate-50 flex flex-col min-h-screen">
    {% include 'components/_navbar.html' %}

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl border border-slate-100">
            
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight uppercase italic">Apex<span class="text-blue-600">Striker</span></h2>
                <p class="text-slate-500 mt-2 font-medium">Secure your identity, Striker.</p>
            </div>

            <p class="text-sm text-slate-500 mb-8 text-center leading-relaxed">
                Please enter and confirm your new strong password below to regain access to your account.
            </p>

            <form method="POST" action="/reset-password-confirm/" class="space-y-6">
                {% csrf_token %}

                <div class="space-y-1">
                    <label class="text-sm font-bold text-slate-700 flex items-center gap-2">
                        <i data-lucide="key-round" class="w-4 h-4 text-blue-600"></i> New Password
                    </label>
                    <div class="relative">
                        <input type="password" name="new_password" id="pass1" placeholder="••••••••" required
                               class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-white">
                        <button type="button" onclick="togglePass('pass1', 'eye1')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600">
                            <i data-lucide="eye" id="eye1" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="text-sm font-bold text-slate-700 flex items-center gap-2">
                        <i data-lucide="check-circle" class="w-4 h-4 text-blue-600"></i> Confirm New Password
                    </label>
                    <div class="relative">
                        <input type="password" name="confirm_password" id="pass2" placeholder="••••••••" required
                               class="w-full p-4 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition bg-white">
                        <button type="button" onclick="togglePass('pass2', 'eye2')" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-blue-600">
                            <i data-lucide="eye" id="eye2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-100 flex items-center justify-center gap-3 transition-all active:scale-95 uppercase tracking-wider">
                    <i data-lucide="shield-check" class="w-5 h-5"></i>
                    Update Password
                </button>
            </form>

            <div class="mt-8 text-center">
                <p class="text-[10px] text-slate-400 font-black uppercase italic tracking-widest">
                    Encryption Active • Apex Security Protocol
                </p>
            </div>
        </div>
    </main>

    {% include 'components/_footer.html' %}

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();

        // Multi-input toggle function
        function togglePass(inputId, iconId) {
            const passInput = document.getElementById(inputId);
            const eyeIcon = document.getElementById(iconId);
            
            if (passInput.type === 'password') {
                passInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
