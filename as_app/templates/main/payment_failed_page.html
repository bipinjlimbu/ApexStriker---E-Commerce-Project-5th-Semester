<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Aborted | ApexStriker</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
</head>

<body class="bg-slate-50 flex flex-col min-h-screen">
    {% include 'components/_navbar.html' %}

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white p-10 rounded-3xl shadow-xl border border-slate-100 text-center">
            
            <div class="flex justify-center mb-6">
                <div class="bg-red-50 p-5 rounded-full animate-pulse">
                    <i data-lucide="x-circle" class="w-16 h-16 text-red-600"></i>
                </div>
            </div>
            
            <h2 class="text-3xl font-black text-slate-900 tracking-tight uppercase italic mb-2">
                Protocol <span class="text-red-600">Aborted</span>
            </h2>
            
            <p class="text-slate-500 mb-8 font-medium leading-relaxed">
                {% if messages %}
                    {% for message in messages %}{{ message }}{% endfor %}
                {% else %}
                    Verification failed or the connection was lost, Striker.
                {% endif %}
            </p>

            <div class="space-y-4">
                <a href="/cart/" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl hover:bg-black shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95 uppercase tracking-wider">
                    <i data-lucide="shopping-cart" class="w-5 h-5"></i>
                    Back to Cart
                </a>
                
                <a href="/" class="block text-slate-400 font-bold hover:text-slate-600 transition-colors uppercase text-xs tracking-[0.2em]">
                    Return to Base
                </a>
            </div>
        </div>
    </main>

    {% include 'components/_footer.html' %}

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
