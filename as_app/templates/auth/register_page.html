<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | ApexStriker</title>
    {% load static %}
    <link href="{% static 'css/styles.css' %}" rel="stylesheet" />
    <style>
        .hidden-fields { display: none; }
        #image-preview { transition: transform 0.3s ease; }
        .group:hover #image-preview { transform: scale(1.05); }
    </style>
</head>

<body class="bg-slate-50 flex flex-col min-h-screen">
    {% include 'components/_navbar.html' %}

    <main class="flex-grow flex items-center justify-center py-12 px-4">
        <div class="max-w-2xl w-full bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            
            <div class="text-center mb-10">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight uppercase italic">Apex<span class="text-blue-600">Striker</span></h2>
                <p class="text-slate-500 mt-2 font-medium">Create your elite account today</p>
            </div>

            <form id="registrationForm" method="POST" action="/register/" enctype="multipart/form-data" class="space-y-6">
                {% csrf_token %}

                <div class="flex gap-2 p-1.5 bg-slate-100 rounded-2xl">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="role" value="customer" class="hidden peer" checked onchange="toggleFields('customer')">
                        <div class="flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm text-slate-500">
                            <i data-lucide="user" class="w-4 h-4"></i> Customer
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="role" value="vendor" class="hidden peer" onchange="toggleFields('vendor')">
                        <div class="flex items-center justify-center gap-2 py-3 rounded-xl font-bold transition-all peer-checked:bg-white peer-checked:text-blue-600 peer-checked:shadow-sm text-slate-500">
                            <i data-lucide="store" class="w-4 h-4"></i> Vendor
                        </div>
                    </label>
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-bold text-slate-700 mb-2 flex items-center gap-2">
                        <i data-lucide="image-plus" class="w-4 h-4"></i> Profile Picture
                    </label>
                    <div class="flex items-center justify-center w-full">
                        <label class="relative group flex flex-col items-center justify-center w-full h-48 border-2 border-slate-300 border-dashed rounded-2xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition overflow-hidden">
                            <div id="upload-placeholder" class="flex flex-col items-center justify-center pt-5 pb-6">
                                <div class="w-12 h-12 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center mb-3">
                                    <i data-lucide="camera" class="w-6 h-6"></i>
                                </div>
                                <p class="text-sm text-slate-500 font-bold">Click to upload photo</p>
                            </div>

                            <img id="image-preview" class="hidden absolute inset-0 w-full h-full object-cover" />
                            
                            <div id="change-overlay" class="hidden absolute inset-0 bg-black/40 items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <div class="bg-white/20 backdrop-blur-md px-4 py-2 rounded-full border border-white/30 flex items-center gap-2">
                                    <i data-lucide="refresh-cw" class="w-3 h-3 text-white"></i>
                                    <p class="text-white text-xs font-bold uppercase tracking-wider">Change</p>
                                </div>
                            </div>
                            <input type="file" name="profile_picture" id="profile-input" accept="image/*" class="hidden" onchange="previewImage(this)" />
                        </label>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="at-sign" class="w-4 h-4"></i> Username</label>
                        <input type="text" name="username" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="mail" class="w-4 h-4"></i> Email</label>
                        <input type="email" name="email" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700">First Name</label>
                        <input type="text" name="first_name" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700">Last Name</label>
                        <input type="text" name="last_name" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="lock" class="w-4 h-4"></i> Password</label>
                        <input type="password" name="password" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition" required>
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="phone" class="w-4 h-4"></i> Phone</label>
                        <input type="text" name="phone" class="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                    </div>
                </div>

                <div id="customer-fields" class="space-y-4 pt-4 border-t border-slate-100">
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="map-pin" class="w-4 h-4"></i> Shipping Address</label>
                        <input type="text" name="shipping_address" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-700">City</label>
                            <input type="text" name="city_customer" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="target" class="w-4 h-4"></i> Position</label>
                            <select name="position" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 appearance-none">
                                <option value="" hidden>Optional</option>
                                <option value="attacker">Attacker</option>
                                <option value="midfielder">Midfielder</option>
                                <option value="defender">Defender</option>
                                <option value="goalkeeper">Goalkeeper</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="vendor-fields" class="hidden-fields space-y-4 pt-4 border-t border-slate-100">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="shopping-bag" class="w-4 h-4"></i> Shop Name</label>
                            <input type="text" name="shop_name" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="file-text" class="w-4 h-4"></i> PAN Number</label>
                            <input type="text" name="pan_number" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="space-y-1">
                        <label class="text-sm font-bold text-slate-700">Shop Address</label>
                        <input type="text" name="shop_address" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-700">Business City</label>
                            <input type="text" name="city_vendor" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-bold text-slate-700 flex items-center gap-2"><i data-lucide="credit-card" class="w-4 h-4"></i> Bank Acc No.</label>
                            <input type="text" name="bank_account_number" class="w-full p-3 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                        </div>
                    </div>
                    <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                        <label class="block text-xs font-black text-blue-700 uppercase mb-2 flex items-center gap-2">
                            <i data-lucide="shield-check" class="w-4 h-4"></i> ID Proof Document
                        </label>
                        <input type="file" name="id_proof" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-blue-600 file:text-white hover:file:bg-blue-700">
                    </div>
                </div>

                <button type="submit" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl hover:bg-blue-700 shadow-xl shadow-blue-200 flex items-center justify-center gap-3 transition-all active:scale-95">
                    <i data-lucide="user-plus" class="w-5 h-5"></i>
                    Create Account
                </button>
            </form>
        </div>
    </main>

    {% include 'components/_footer.html' %}

    <script src="{% static 'js/lucide.min.js' %}"></script>
    <script>
        lucide.createIcons();

        function previewImage(input) {
            const file = input.files[0];
            const preview = document.getElementById('image-preview');
            const placeholder = document.getElementById('upload-placeholder');
            const overlay = document.getElementById('change-overlay');

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    overlay.classList.remove('hidden');
                    overlay.classList.add('flex');
                    placeholder.classList.add('hidden');
                }
                reader.readAsDataURL(file);
            }
        }

        function toggleFields(role) {
            const customerField = document.getElementById('customer-fields');
            const vendorField = document.getElementById('vendor-fields');

            if (role === 'customer') {
                customerField.classList.remove('hidden-fields');
                vendorField.classList.add('hidden-fields');
            } else {
                vendorField.classList.remove('hidden-fields');
                customerField.classList.add('hidden-fields');
            }
        }
    </script>
</body>
</html>
